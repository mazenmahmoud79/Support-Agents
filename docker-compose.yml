version: '3.8'

services:
  # PostgreSQL Database (internal only — no host port exposure)
  postgres:
    image: postgres:15-alpine
    container_name: support-agent-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-support_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-support_agent_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-support_agent}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - support-agent-network

  # Qdrant Vector Database (internal only)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: support-agent-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - support-agent-network

  # Redis (internal only)
  redis:
    image: redis:7-alpine
    container_name: support-agent-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - support-agent-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: support-agent-backend
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-support_agent}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-support_agent_db}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_URL=redis://redis:6379
      - GROQ_API_KEY=${GROQ_API_KEY:?Set GROQ_API_KEY in .env}
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env}
      - SUPER_ADMIN_PASSWORD=${SUPER_ADMIN_PASSWORD:?Set SUPER_ADMIN_PASSWORD in .env}
      - DEBUG=${DEBUG:-false}
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost"]}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-onboarding@resend.dev}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - support-agent-network

  # React Frontend (only public-facing service)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    container_name: support-agent-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - support-agent-network

volumes:
  postgres_data:
    driver: local
  qdrant_data:
    driver: local
  redis_data:
    driver: local

networks:
  support-agent-network:
    driver: bridge
