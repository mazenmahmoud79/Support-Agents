version: '3.8'

services:
  # PostgreSQL Database for Development
  postgres:
    image: postgres:15-alpine
    container_name: support-agent-postgres-dev
    environment:
      POSTGRES_USER: support_agent
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: support_agent_db
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U support_agent" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev-network

  # Qdrant Vector Database for Development
  qdrant:
    image: qdrant/qdrant:latest
    container_name: support-agent-qdrant-dev
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_dev_data:/qdrant/storage
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:6333/" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev-network

  # Redis for Development (Optional)
  redis:
    image: redis:7-alpine
    container_name: support-agent-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev-network

volumes:
  postgres_dev_data:
    driver: local
  qdrant_dev_data:
    driver: local
  redis_dev_data:
    driver: local

networks:
  dev-network:
    driver: bridge
